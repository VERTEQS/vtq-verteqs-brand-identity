name: Auto Merge

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: read
    steps:
      - name: Wait for checks
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.pull_request.head.sha;
            const maxAttempts = 30;
            for (let i = 0; i < maxAttempts; i++) {
              const { data: checks } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: sha,
              });
              const others = checks.check_runs.filter(c => c.name !== 'auto-merge');
              const pending = others.filter(c => c.status !== 'completed');
              const failed = others.filter(c =>
                c.status === 'completed' && c.conclusion !== 'success' && c.conclusion !== 'skipped'
              );
              if (failed.length > 0) {
                core.setFailed(`Check failed: ${failed.map(c => c.name).join(', ')}`);
                return;
              }
              if (pending.length === 0) {
                core.info('All checks passed');
                return;
              }
              core.info(`Waiting for: ${pending.map(c => c.name).join(', ')}`);
              await new Promise(r => setTimeout(r, 10000));
            }
            core.setFailed('Timed out waiting for checks');

      - name: Merge
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              merge_method: 'merge',
            });

      - name: Delete branch
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            await github.rest.git.deleteRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${context.payload.pull_request.head.ref}`,
            });
